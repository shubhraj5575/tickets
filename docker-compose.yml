services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: onegroup_portal
      POSTGRES_USER: onegroup
      POSTGRES_PASSWORD: onegroup_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data:
